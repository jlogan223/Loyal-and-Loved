<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-58KPD3FXC2"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyal &amp; Loved — Interactive Colour Palette Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; background: #f0f0f0; color: #333; }

.top-bar {
  background: white; padding: 1.25rem 2rem; border-bottom: 1px solid #ddd;
  display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
}
.top-bar h1 { font-family: 'Fraunces', serif; font-size: 1.4rem; }
.top-bar .actions { display: flex; gap: 0.75rem; }
.top-bar button {
  padding: 0.5rem 1rem; border-radius: 8px; font-weight: 600; font-size: 0.85rem;
  cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.15s;
}
.btn-copy { background: #1B3A5C; color: white; border: none; }
.btn-copy:hover { background: #2A5C8F; }
.btn-reset { background: white; color: #666; border: 1px solid #ccc; }
.btn-reset:hover { background: #f5f5f5; }

.layout { display: flex; min-height: calc(100vh - 60px); }

/* Sidebar */
.sidebar {
  width: 320px; background: white; border-right: 1px solid #ddd; padding: 1.5rem;
  overflow-y: auto; flex-shrink: 0;
}
.sidebar h2 { font-family: 'Fraunces', serif; font-size: 1.1rem; margin-bottom: 1rem; }

.preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
.preset-btn {
  padding: 0.6rem; border-radius: 8px; border: 2px solid #e0e0e0; background: white;
  cursor: pointer; text-align: left; transition: all 0.15s; font-family: 'Nunito', sans-serif;
}
.preset-btn:hover { border-color: #999; }
.preset-btn.active { border-color: #1B3A5C; background: #f0f4f8; }
.preset-btn .preset-swatches { display: flex; height: 24px; border-radius: 4px; overflow: hidden; margin-bottom: 0.4rem; }
.preset-btn .preset-swatches div { flex: 1; }
.preset-btn .preset-name { font-size: 0.75rem; font-weight: 700; }

.divider { border: none; border-top: 1px solid #eee; margin: 1.25rem 0; }

.colour-group { margin-bottom: 1.25rem; }
.colour-group h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 0.75rem; }

.colour-row {
  display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem;
  padding: 0.4rem 0.5rem; border-radius: 6px; transition: background 0.1s;
}
.colour-row:hover { background: #f8f8f8; }
.colour-row label { font-size: 0.85rem; font-weight: 600; flex: 1; min-width: 0; }
.colour-row .picker-wrap {
  position: relative; width: 36px; height: 36px; border-radius: 8px; overflow: hidden;
  border: 2px solid #e0e0e0; flex-shrink: 0; cursor: pointer;
}
.colour-row input[type="color"] {
  position: absolute; top: -8px; left: -8px; width: 52px; height: 52px;
  border: none; cursor: pointer; background: none;
}
.colour-row .hex-input {
  width: 80px; padding: 0.3rem 0.4rem; border: 1px solid #ddd; border-radius: 4px;
  font-family: 'Nunito', sans-serif; font-size: 0.8rem; text-align: center;
  text-transform: uppercase;
}

/* Preview area */
.preview-area { flex: 1; padding: 2rem; overflow-y: auto; }
.preview-label {
  text-align: center; font-size: 0.8rem; text-transform: uppercase;
  letter-spacing: 0.1em; color: #999; margin-bottom: 0.75rem; font-weight: 700;
}

.mock-site { max-width: 700px; margin: 0 auto 2rem; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }

/* Mock site elements */
.ms-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; }
.ms-logo { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.2rem; }
.ms-logo .amp { opacity: 0.5; }
.ms-nav { display: flex; gap: 1rem; font-size: 0.85rem; }
.ms-nav a { text-decoration: none; opacity: 0.7; }

.ms-hero { padding: 2.5rem 1.5rem; text-align: center; }
.ms-hero h2 { font-family: 'Fraunces', serif; font-size: 1.6rem; margin-bottom: 0.5rem; }
.ms-hero p { font-size: 0.95rem; opacity: 0.65; max-width: 480px; margin: 0 auto; }

.ms-cards { display: flex; gap: 1rem; padding: 1.25rem 1.5rem; }
.ms-card { flex: 1; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.ms-card-img { height: 80px; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; opacity: 0.7; }
.ms-card-body { padding: 0.75rem; }
.ms-card-body h4 { font-family: 'Fraunces', serif; font-size: 0.85rem; margin-bottom: 0.3rem; }
.ms-card-body p { font-size: 0.75rem; opacity: 0.55; margin-bottom: 0.5rem; }
.ms-card-btn { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; color: white; text-decoration: none; }

.ms-newsletter { padding: 1.5rem; text-align: center; margin: 0.75rem 1.5rem; border-radius: 10px; }
.ms-newsletter h3 { font-family: 'Fraunces', serif; font-size: 1rem; color: white; margin-bottom: 0.3rem; }
.ms-newsletter p { font-size: 0.8rem; color: rgba(255,255,255,0.8); margin-bottom: 0.75rem; }
.ms-newsletter-input { display: flex; gap: 0.5rem; max-width: 350px; margin: 0 auto; }
.ms-newsletter-input input { flex: 1; padding: 0.5rem; border: none; border-radius: 6px; font-family: 'Nunito', sans-serif; font-size: 0.8rem; }
.ms-newsletter-input button { padding: 0.5rem 1rem; border: 2px solid white; background: rgba(255,255,255,0.15); color: white; border-radius: 6px; font-weight: 700; font-size: 0.8rem; cursor: pointer; font-family: 'Nunito', sans-serif; }

.ms-footer { padding: 1.25rem 1.5rem; text-align: center; font-size: 0.75rem; opacity: 0.5; border-top-width: 1px; border-top-style: solid; }

/* Toast notification */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
  background: #333; color: white; padding: 0.75rem 1.5rem; border-radius: 8px;
  font-size: 0.9rem; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 200;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Colour Palette Builder</h1>
  <div class="actions">
    <button class="btn-reset" onclick="resetToPreset()">Reset</button>
    <button class="btn-copy" onclick="copyCSSVars()">Copy CSS Variables</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <h2>Presets</h2>
    <div class="preset-grid" id="presetGrid"></div>

    <hr class="divider">

    <div class="colour-group">
      <h3>Core Colours</h3>
      <div class="colour-row">
        <label>Primary</label>
        <div class="picker-wrap"><input type="color" data-key="primary" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="primary" oninput="onHexInput(this)" maxlength="7">
      </div>
      <div class="colour-row">
        <label>Accent</label>
        <div class="picker-wrap"><input type="color" data-key="accent" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="accent" oninput="onHexInput(this)" maxlength="7">
      </div>
      <div class="colour-row">
        <label>Dark Text</label>
        <div class="picker-wrap"><input type="color" data-key="dark" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="dark" oninput="onHexInput(this)" maxlength="7">
      </div>
    </div>

    <div class="colour-group">
      <h3>Light Mode</h3>
      <div class="colour-row">
        <label>Background</label>
        <div class="picker-wrap"><input type="color" data-key="light" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="light" oninput="onHexInput(this)" maxlength="7">
      </div>
      <div class="colour-row">
        <label>Cream / Hero</label>
        <div class="picker-wrap"><input type="color" data-key="cream" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="cream" oninput="onHexInput(this)" maxlength="7">
      </div>
      <div class="colour-row">
        <label>Card Background</label>
        <div class="picker-wrap"><input type="color" data-key="cardBg" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="cardBg" oninput="onHexInput(this)" maxlength="7">
      </div>
    </div>

    <div class="colour-group">
      <h3>Dark Mode</h3>
      <div class="colour-row">
        <label>Background</label>
        <div class="picker-wrap"><input type="color" data-key="darkBg" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="darkBg" oninput="onHexInput(this)" maxlength="7">
      </div>
      <div class="colour-row">
        <label>Text</label>
        <div class="picker-wrap"><input type="color" data-key="darkText" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="darkText" oninput="onHexInput(this)" maxlength="7">
      </div>
      <div class="colour-row">
        <label>Card Background</label>
        <div class="picker-wrap"><input type="color" data-key="darkCardBg" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="darkCardBg" oninput="onHexInput(this)" maxlength="7">
      </div>
      <div class="colour-row">
        <label>Secondary Text</label>
        <div class="picker-wrap"><input type="color" data-key="darkSecondary" oninput="onColourChange(this)"></div>
        <input type="text" class="hex-input" data-key="darkSecondary" oninput="onHexInput(this)" maxlength="7">
      </div>
    </div>
  </div>

  <div class="preview-area">
    <p class="preview-label">Light Mode Preview</p>
    <div class="mock-site" id="lightPreview"></div>

    <p class="preview-label">Dark Mode Preview</p>
    <div class="mock-site" id="darkPreview"></div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const PRESETS = {
  current: {
    name: 'Current', primary: '#5B7C5B', accent: '#C4745A', dark: '#2D2D2D',
    light: '#FAF7F2', cream: '#FFF8F0', cardBg: '#FFFFFF',
    darkBg: '#1a1a1a', darkText: '#fafafa', darkCardBg: '#262626', darkSecondary: '#aaaaaa'
  },
  navy: {
    name: 'Navy & Gold', primary: '#1B3A5C', accent: '#D4A853', dark: '#1A2332',
    light: '#F7F5F0', cream: '#FFFBF2', cardBg: '#FFFFFF',
    darkBg: '#141E2B', darkText: '#E8E4DC', darkCardBg: '#1E2A3A', darkSecondary: '#8BA3C0'
  },
  teal: {
    name: 'Teal & Coral', primary: '#1A7A6D', accent: '#E8845C', dark: '#1E2D2B',
    light: '#F5F7F6', cream: '#FFF9F6', cardBg: '#FFFFFF',
    darkBg: '#162220', darkText: '#E0EBE8', darkCardBg: '#1E2D2B', darkSecondary: '#7FB5AD'
  },
  plum: {
    name: 'Plum & Peach', primary: '#5C3D6E', accent: '#F0926A', dark: '#2A1F30',
    light: '#FAF6F8', cream: '#FFF7F3', cardBg: '#FFFFFF',
    darkBg: '#1F1724', darkText: '#EDE4F0', darkCardBg: '#2A1F30', darkSecondary: '#A07BB5'
  }
};

let colours = { ...PRESETS.navy };
let activePreset = 'navy';

function buildPresetButtons() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  for (const [key, p] of Object.entries(PRESETS)) {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (key === activePreset ? ' active' : '');
    btn.onclick = () => { activePreset = key; colours = { ...PRESETS[key] }; syncAll(); };
    btn.innerHTML = `
      <div class="preset-swatches">
        <div style="background:${p.primary}"></div>
        <div style="background:${p.accent}"></div>
        <div style="background:${p.light}"></div>
        <div style="background:${p.darkBg}"></div>
      </div>
      <div class="preset-name">${p.name}</div>
    `;
    grid.appendChild(btn);
  }
}

function syncInputs() {
  document.querySelectorAll('input[type="color"]').forEach(el => {
    el.value = colours[el.dataset.key];
    el.parentElement.style.backgroundColor = colours[el.dataset.key];
  });
  document.querySelectorAll('.hex-input').forEach(el => {
    el.value = colours[el.dataset.key];
  });
}

function lightenColour(hex, amount) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amount); g = Math.min(255, g + amount); b = Math.min(255, b + amount);
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

function renderPreview(containerId, mode) {
  const c = colours;
  const isLight = mode === 'light';
  const bg = isLight ? c.light : c.darkBg;
  const text = isLight ? c.dark : c.darkText;
  const cardBg = isLight ? c.cardBg : c.darkCardBg;
  const secondary = isLight ? '#666666' : c.darkSecondary;
  const border = isLight ? '#e0e0e0' : lightenColour(c.darkBg, 30);
  const gradLight = lightenColour(c.primary, 40);

  document.getElementById(containerId).innerHTML = `
    <div class="ms-header" style="background:${cardBg};border-bottom:1px solid ${border};">
      <span class="ms-logo" style="color:${text};">Loyal <span class="amp" style="opacity:0.45;">&amp;</span> Loved</span>
      <div class="ms-nav">
        <a style="color:${text};">Home</a>
        <a style="color:${text};">Categories</a>
        <a style="color:${text};">About</a>
        <span style="color:${text};font-size:1.1rem;cursor:pointer;">${isLight ? '\u{1F319}' : '\u{2600}\u{FE0F}'}</span>
      </div>
    </div>
    <div class="ms-hero" style="background:${isLight ? `linear-gradient(135deg, ${c.light}, ${c.cream})` : bg};">
      <h2 style="color:${text};">Trusted Advice for UK Pet Owners</h2>
      <p style="color:${secondary};">Expert guides on pet insurance, vet care, nutrition, and everything your furry friends need.</p>
    </div>
    <div class="ms-cards" style="background:${bg};">
      <div class="ms-card" style="background:${cardBg};">
        <div class="ms-card-img" style="background:linear-gradient(135deg,${c.primary},${gradLight});">[Hero Image]</div>
        <div class="ms-card-body">
          <h4 style="color:${text};">Best Pet Insurance UK</h4>
          <p style="color:${secondary};">Compare Petplan, Animal Friends &amp; more</p>
          <a class="ms-card-btn" style="background:${c.primary};">Read Guide</a>
        </div>
      </div>
      <div class="ms-card" style="background:${cardBg};">
        <div class="ms-card-img" style="background:linear-gradient(135deg,${c.primary},${gradLight});">[Hero Image]</div>
        <div class="ms-card-body">
          <h4 style="color:${text};">Vet Bills UK 2026</h4>
          <p style="color:${secondary};">What should you expect to pay?</p>
          <a class="ms-card-btn" style="background:${c.accent};">Read Guide</a>
        </div>
      </div>
      <div class="ms-card" style="background:${cardBg};">
        <div class="ms-card-img" style="background:linear-gradient(135deg,${c.accent},${lightenColour(c.accent, 40)});">[Hero Image]</div>
        <div class="ms-card-body">
          <h4 style="color:${text};">Puppy First Year</h4>
          <p style="color:${secondary};">Complete checklist for new owners</p>
          <a class="ms-card-btn" style="background:${c.primary};">Read Guide</a>
        </div>
      </div>
    </div>
    <div class="ms-newsletter" style="background:linear-gradient(135deg,${c.primary},${c.accent});">
      <h3>Get Honest Pet Advice Delivered</h3>
      <p>Join hundreds of UK pet owners getting practical guides.</p>
      <div class="ms-newsletter-input">
        <input type="text" placeholder="Your email address" disabled>
        <button>Subscribe</button>
      </div>
    </div>
    <div class="ms-footer" style="background:${cardBg};color:${secondary};border-color:${border};">
      &copy; 2026 Loyal &amp; Loved UK. All rights reserved.
    </div>
  `;
}

function syncAll() {
  buildPresetButtons();
  syncInputs();
  renderPreview('lightPreview', 'light');
  renderPreview('darkPreview', 'dark');
}

function onColourChange(el) {
  colours[el.dataset.key] = el.value;
  activePreset = null;
  syncAll();
}

function onHexInput(el) {
  let val = el.value.trim();
  if (!val.startsWith('#')) val = '#' + val;
  if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
    colours[el.dataset.key] = val;
    activePreset = null;
    syncAll();
  }
}

function resetToPreset() {
  activePreset = activePreset || 'navy';
  colours = { ...PRESETS[activePreset] };
  syncAll();
}

function copyCSSVars() {
  const c = colours;
  const css = `:root {
  --color-primary: ${c.primary};
  --color-accent: ${c.accent};
  --color-dark: ${c.dark};
  --color-light: ${c.light};
  --color-cream: ${c.cream};
  --color-bg: var(--color-light);
  --color-text: var(--color-dark);
  --color-card-bg: ${c.cardBg};
}

[data-theme="dark"] {
  --color-bg: ${c.darkBg};
  --color-text: ${c.darkText};
  --color-text-secondary: ${c.darkSecondary};
  --color-border: ${lightenColour(c.darkBg, 30)};
  --color-card-bg: ${c.darkCardBg};
  --color-input-bg: ${c.darkBg};
  --color-light: ${c.darkBg};
  --color-cream: ${lightenColour(c.darkBg, 10)};
}`;

  navigator.clipboard.writeText(css).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = 'CSS variables copied to clipboard!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }).catch(() => {
    // Fallback: show in a prompt
    prompt('Copy these CSS variables:', css);
  });
}

// Init
syncAll();
</script>
</body>
</html>
